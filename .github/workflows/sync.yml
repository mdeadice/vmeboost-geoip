name: Sync geoip

on:
  workflow_dispatch:
  schedule:
    - cron: '30 5 * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout vmeboost-geoip
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Download latest geoip.dat from hydraponique
        run: |
          curl -fsSL "https://github.com/hydraponique/roscomvpn-geoip/raw/release/geoip.dat" \
            -o geoip.dat
          test -s geoip.dat
          echo "geoip.dat size: $(du -h geoip.dat | cut -f1)"

      - name: Set tag
        run: echo "DAILY_TAG=$(date +%Y%m%d%H%M)" >> $GITHUB_ENV

      - name: Create git tag
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${process.env.DAILY_TAG}`,
              sha: context.sha
            })

      - name: Push to release branch
        run: |
          set -euo pipefail
          rm -rf release && mkdir -p release
          cp geoip.dat release/
          sha256sum release/geoip.dat > release/geoip.dat.sha256
          cd release
          git init
          git config user.name "vmeboost-bot"
          git config user.email "vmeboost@users.noreply.github.com"
          git checkout -b release
          git add -A
          git commit -m "Release ${{ env.DAILY_TAG }}"
          git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}"
          git push -f origin release

      - name: Purge jsDelivr CDN
        run: |
          curl -s "https://purge.jsdelivr.net/gh/${{ github.repository }}@release/release/geoip.dat" || true
